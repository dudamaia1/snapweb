<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>SnapWeb</title>

<link
rel="stylesheet"
href="style.css"
/>

</head>

<body>

<header>

<h1>✨ SnapWeb</h1>

<p>
Compartilhe sua vibe 💜
</p>

</header>

<!-- STORIES -->

<section class="stories">

<div class="story">😄</div>
<div class="story">🔥</div>
<div class="story">❤️</div>
<div class="story">🌙</div>

</section>

<!-- CRIAR POST -->

<section class="create-post">

<input
id="username"
placeholder="Seu nome"
/>

<textarea
id="postText"
placeholder="Compartilhe sua vibe..."
></textarea>

<select id="mood">

<option>😄 Feliz</option>
<option>🔥 Motivado</option>
<option>🌧️ Triste</option>
<option>❤️ Apaixonado</option>
<option>🌙 Reflexivo</option>

</select>

<button onclick="createPost()">

Publicar ✨

</button>

</section>

<!-- FEED -->

<section id="feed"></section>

<!-- CHAT -->

<section class="chat">

<h2>💬 Chat</h2>

<div id="chatMessages"></div>

<input
id="chatInput"
placeholder="Digite..."
/>

<button onclick="sendMessage()">

Enviar 💜

</button>

</section>

<!-- PERFIL -->

<section class="profile">

<h2>👤 Perfil</h2>

<p>
✨ Usuário SnapWeb
</p>

<p id="followers">
❤️ Seguidores: 120
</p>

<button onclick="followUser()">
Seguir 💜
</button>

</section>

<!-- MENU -->

<nav class="bottom-menu">

<button>🏠</button>
<button>🔍</button>
<button>➕</button>
<button>🫂</button>
<button>👤</button>

</nav>

<script src="script.js"></script>

</body>

</html>V
