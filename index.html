<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>SnapWeb</title>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

/* HEADER */

header{
background:#1c1c1c;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

/* MENU */

.menu{
display:flex;
justify-content:space-around;
background:#222;
padding:10px;
position:sticky;
top:0;
}

.menu button{
background:none;
border:none;
color:white;
font-size:24px;
}

/* PÁGINAS */

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

/* STORIES */

.stories{
display:flex;
gap:10px;
overflow:auto;
margin-bottom:20px;
}

.story{
min-width:70px;
height:70px;
border-radius:50%;
background:linear-gradient(
135deg,
#ff0080,
#5f00ff
);
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}

/* POSTS */

.post{
background:#1e1e1e;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

/* INPUTS */

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2a2a2a;
color:white;
}

/* BOTÕES */

button{
padding:12px;
border:none;
border-radius:999px;
background:#ff0080;
color:white;
margin-top:10px;
}

/* CHAT */

.message{
background:#2a2a2a;
padding:10px;
border-radius:10px;
margin-top:10px;
}

/* PERFIL */

.profile{
text-align:center;
}

.avatar{
width:120px;
height:120px;
border-radius:50%;
background:linear-gradient(
135deg,
#ff0080,
#5f00ff
);
margin:auto;
margin-bottom:20px;
}

</style>

</head>

<body>

<header>
✨ SnapWeb
</header>

<!-- MENU -->

<div class="menu">

<button onclick="showPage('home')">
🏠
</button>

<button onclick="showPage('create')">
➕
</button>

<button onclick="showPage('chat')">
💬
</button>

<button onclick="showPage('profile')">
👤
</button>

</div>

<!-- HOME -->

<div
id="home"
class="page active"
>

<div class="stories">

<div class="story">😄</div>
<div class="story">🔥</div>
<div class="story">❤️</div>
<div class="story">🌙</div>

</div>

<h2>Feed</h2>

<div id="feed"></div>

</div>

<!-- CREATE -->

<div
id="create"
class="page"
>

<h2>Criar Post</h2>

<input
id="username"
placeholder="Seu nome"
>

<textarea
id="postText"
placeholder="Compartilhe sua vibe..."
></textarea>

<select id="mood">

<option>😄 Feliz</option>
<option>🔥 Motivado</option>
<option>🌧️ Triste</option>
<option>❤️ Apaixonado</option>

</select>

<button onclick="createPost()">

Publicar ✨

</button>

</div>

<!-- CHAT -->

<div
id="chat"
class="page"
>

<h2>💬 Chat</h2>

<div id="messages"></div>

<input
id="chatInput"
placeholder="Digite..."
>

<button onclick="sendMessage()">

Enviar 💜

</button>

</div>

<!-- PROFILE -->

<div
id="profile"
class="page"
>

<div class="profile">

<div class="avatar"></div>

<h2>Duda Maia</h2>

<p id="followers">
❤️ 120 seguidores
</p>

<button onclick="followUser()">

Seguir 💜

</button>

</div>

</div>

<script>

/* TROCAR PÁGINA */

function showPage(pageId){

const pages =
document.querySelectorAll('.page');

pages.forEach(page=>{
page.classList.remove('active');
});

document
.getElementById(pageId)
.classList.add('active');

}

/* POSTS */

let posts = [];

function createPost(){

const username =
document.getElementById(
'username'
).value;

const text =
document.getElementById(
'postText'
).value;

const mood =
document.getElementById(
'mood'
).value;

if(username==='' || text===''){
return;
}

posts.unshift({
username,
text,
mood,
likes:0
});

renderPosts();

showPage('home');

}

/* RENDER POSTS */

function renderPosts(){

const feed =
document.getElementById(
'feed'
);

feed.innerHTML='';

posts.forEach((post,index)=>{

feed.innerHTML += `

<div class="post">

<h3>
${post.username}
</h3>

<p>
${post.mood}
</p>

<p>
${post.text}
</p>

<button onclick="likePost(${index})">

❤️ ${post.likes}

</button>

</div>

`;

});

}

/* CURTIR */

function likePost(index){

posts[index].likes++;

renderPosts();

}

/* CHAT */

function sendMessage(){

const input =
document.getElementById(
'chatInput'
);

if(input.value===''){
return;
}

document.getElementById(
'messages'
).innerHTML += `

<div class="message">

💜 ${input.value}

</div>

`;

input.value='';

}

/* FOLLOW */

let followers = 120;

function followUser(){

followers++;

document.getElementById(
'followers'
).innerHTML =

'❤️ ' +
followers +
' seguidores';

}

/* INICIAR */

renderPosts();

</script>

</body>
</html>
