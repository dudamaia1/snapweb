<!DOCTYPE html>
<html>

<head>
<title>SnapWeb</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#111;
font-family:Arial;
color:white;
}

.top{
background:#ff0080;
padding:20px;
text-align:center;
font-size:30px;
font-weight:bold;
}

.menu{
display:flex;
justify-content:space-around;
background:#222;
padding:10px;
}

.menu button{
background:none;
border:none;
color:white;
font-size:25px;
}

.page{
display:none;
padding:20px;
}

.active{
display:block;
}

.card{
background:#1e1e1e;
padding:20px;
border-radius:20px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#333;
color:white;
}

button{
padding:12px;
border:none;
border-radius:20px;
background:#ff0080;
color:white;
margin-top:10px;
}

.storybox{
display:flex;
gap:10px;
overflow:auto;
}

.story{
min-width:70px;
height:70px;
border-radius:50%;
background:#ff0080;
display:flex;
justify-content:center;
align-items:center;
font-size:30px;
}

</style>

</head>

<body>

<div class="top">
✨ SnapWeb
</div>

<div class="menu">

<button onclick="openPage('home')">
🏠
</button>

<button onclick="openPage('create')">
➕
</button>

<button onclick="openPage('chat')">
💬
</button>

<button onclick="openPage('profile')">
👤
</button>

</div>

<!-- HOME -->

<div id="home" class="page active">

<h2>Stories</h2>

<div class="storybox">

<div class="story">😄</div>
<div class="story">🔥</div>
<div class="story">❤️</div>
<div class="story">🌙</div>

</div>

<h2>Feed</h2>

<div id="feed"></div>

</div>

<!-- CREATE -->

<div id="create" class="page">

<div class="card">

<h2>Criar Post</h2>

<input id="name" placeholder="Seu nome">

<textarea
id="text"
placeholder="Compartilhe sua vibe..."
></textarea>

<button onclick="postar()">
Publicar
</button>

</div>

</div>

<!-- CHAT -->

<div id="chat" class="page">

<div class="card">

<h2>Chat</h2>

<div id="msgs"></div>

<input
id="msgInput"
placeholder="Digite..."
>

<button onclick="enviar()">
Enviar
</button>

</div>

</div>

<!-- PROFILE -->

<div id="profile" class="page">

<div class="card">

<h2>Duda Maia 💜</h2>

<p id="seguidores">
120 seguidores
</p>

<button onclick="seguir()">
Seguir
</button>

</div>

</div>

<script>

function openPage(id){

document
.querySelectorAll('.page')
.forEach(p=>{

p.style.display='none';

});

document
.getElementById(id)
.style.display='block';

}

let posts=[];

function postar(){

let nome =
document.getElementById('name').value;

let texto =
document.getElementById('text').value;

posts.unshift({
nome,
texto,
likes:0
});

mostrarPosts();

openPage('home');

}

function mostrarPosts(){

let feed =
document.getElementById('feed');

feed.innerHTML='';

posts.forEach((p,i)=>{

feed.innerHTML += `

<div class="card">

<h3>${p.nome}</h3>

<p>${p.texto}</p>

<button onclick="curtir(${i})">

❤️ ${p.likes}

</button>

</div>

`;

});

}

function curtir(i){

posts[i].likes++;

mostrarPosts();

}

function enviar(){

let input =
document.getElementById('msgInput');

let msgs =
document.getElementById('msgs');

msgs.innerHTML += `

<div class="card">

💜 ${input.value}

</div>

`;

input.value='';

}

let seg = 120;

function seguir(){

seg++;

document.getElementById(
'seguidores'
).innerHTML =

seg + ' seguidores';

}

</script>

</body>
</html>
