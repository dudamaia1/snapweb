<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0"
/>

<title>SnapWeb</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
overflow:hidden;
}

/* HEADER */

header{

height:70px;

display:flex;

align-items:center;

justify-content:center;

font-size:28px;

font-weight:bold;

background:rgba(0,0,0,.7);

backdrop-filter:blur(10px);

border-bottom:1px solid
rgba(255,255,255,.1);

}

/* PAGES */

.page{

position:absolute;

top:70px;

bottom:80px;

left:0;

right:0;

overflow:auto;

padding:20px;

display:none;

}

.active{
display:block;
}

/* STORIES */

.stories{

display:flex;

gap:12px;

overflow:auto;

margin-bottom:20px;

}

.story{

min-width:70px;

height:70px;

border-radius:50%;

background:linear-gradient(
135deg,
#ff0080,
#5f00ff
);

display:flex;

justify-content:center;

align-items:center;

font-size:30px;

box-shadow:0 0 20px
rgba(255,0,128,.5);

}

/* POSTS */

.post{

background:#1a1a1a;

padding:20px;

border-radius:20px;

margin-bottom:20px;

}

.post button{

background:#ff0080;

border:none;

padding:10px 20px;

border-radius:999px;

color:white;

margin-top:10px;

}

/* CREATE */

.create-post{

background:#1a1a1a;

padding:20px;

border-radius:20px;

}

input,
textarea,
select{

width:100%;

padding:14px;

margin-top:10px;

border:none;

border-radius:14px;

background:#2a2a2a;

color:white;

}

/* CHAT */

.message{

background:#2a2a2a;

padding:12px;

border-radius:12px;

margin-top:10px;

}

/* PROFILE */

.profile{

text-align:center;

}

.avatar{

width:120px;

height:120px;

border-radius:50%;

background:linear-gradient(
135deg,
#ff0080,
#5f00ff
);

margin:auto;

margin-top:20px;

}

/* MENU */

.bottom-menu{

position:fixed;

bottom:0;

left:0;

right:0;

height:80px;

background:#111;

display:flex;

justify-content:space-around;

align-items:center;

border-top:1px solid
rgba(255,255,255,.1);

}

.bottom-menu button{

background:none;

border:none;

color:white;

font-size:28px;

}

</style>

</head>

<body>

<header>
✨ SnapWeb
</header>

<!-- HOME -->

<div
id="home"
class="page active"
>

<div class="stories">

<div class="story">😄</div>
<div class="story">🔥</div>
<div class="story">❤️</div>
<div class="story">🌙</div>

</div>

<div id="feed"></div>

</div>

<!-- CREATE -->

<div
id="create"
class="page"
>

<div class="create-post">

<h2>Criar Post</h2>

<input
id="username"
placeholder="Seu nome"
/>

<textarea
id="postText"
placeholder="Compartilhe sua vibe..."
></textarea>

<select id="mood">

<option>😄 Feliz</option>
<option>🔥 Motivado</option>
<option>🌧️ Triste</option>
<option>❤️ Apaixonado</option>

</select>

<button onclick="createPost()">

Publicar ✨

</button>

</div>

</div>

<!-- CHAT -->

<div
id="chat"
class="page"
>

<h2>💬 Social</h2>

<div id="messages"></div>

<input
id="chatInput"
placeholder="Digite..."
>

<button onclick="sendMessage()">

Enviar 💜

</button>

</div>

<!-- PROFILE -->

<div
id="profile"
class="page"
>

<div class="profile">

<div class="avatar"></div>

<h2>Duda Maia</h2>

<p>
✨ Sua energia conecta pessoas
</p>

<p id="followers">
❤️ 120 seguidores
</p>

<button onclick="followUser()">

Seguir 💜

</button>

</div>

</div>

<!-- MENU -->

<div class="bottom-menu">

<button onclick="showPage('home')">
🏠
</button>

<button onclick="showPage('create')">
➕
</button>

<button onclick="showPage('chat')">
💬
</button>

<button onclick="showPage('profile')">
👤
</button>

</div>

<script>

let posts = [];

function showPage(pageId){

document.querySelectorAll(
'.page'
).forEach(page=>{

page.classList.remove(
'active'
);

});

document.getElementById(
pageId
).classList.add(
'active'
);

}

function createPost(){

const username =
document.getElementById(
'username'
).value;

const text =
document.getElementById(
'postText'
).value;

const mood =
document.getElementById(
'mood'
).value;

posts.unshift({
username,
text,
mood,
likes:0
});

renderPosts();

showPage('home');

}

function renderPosts(){

const feed =
document.getElementById(
'feed'
);

feed.innerHTML='';

posts.forEach((post,index)=>{

feed.innerHTML += `

<div class="post">

<h2>
${post.username}
</h2>

<p>
${post.mood}
</p>

<p>
${post.text}
</p>

<button onclick="likePost(${index})">

❤️ ${post.likes}

</button>

</div>

`;

});

}

function likePost(index){

posts[index].likes++;

renderPosts();

}

function sendMessage(){

const input =
document.getElementById(
'chatInput'
);

const messages =
document.getElementById(
'messages'
);

if(input.value.trim()==='')
return;

messages.innerHTML += `

<div class="message">

💜 ${input.value}

</div>

`;

input.value='';

}

let followers = 120;

function followUser(){

followers++;

document.getElementById(
'followers'
).innerHTML =

'❤️ ' + followers + ' seguidores';

}

</script>

</body>
</html>
