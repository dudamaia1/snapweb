<!-- ===== VIBE DO DIA ===== -->

<div class="card">

<h2>🌈 Vibe do Dia</h2>

<select id="dailyMood">

<option>😄 Feliz</option>
<option>🔥 Motivado</option>
<option>🌧️ Triste</option>
<option>❤️ Apaixonado</option>
<option>🌙 Reflexivo</option>

</select>

<button onclick="changeVibe()">
Atualizar Vibe ✨
</button>

</div>

<!-- ===== STORIES ===== -->

<div class="card">

<h2>📷 Stories</h2>

<div id="stories"
style="
display:flex;
gap:10px;
overflow:auto;
">

<div class="story">
😄
</div>

<div class="story">
🔥
</div>

<div class="story">
❤️
</div>

<div class="story">
🌙
</div>

</div>

</div>

<!-- ===== MINI VIDEOS ===== -->

<div class="card">

<h2>🎥 Mini Vídeos</h2>

<video
controls
width="100%"
style="border-radius:20px;"
>

<source
src="https://www.w3schools.com/html/mov_bbb.mp4"
type="video/mp4"
>

</video>

</div>

<!-- ===== SEGUIDORES ===== -->

<div class="card">

<h2>❤️ Seguidores</h2>

<p id="followers">
120 seguidores
</p>

<button onclick="followUser()">
Seguir 💜
</button>

</div>

<!-- ===== NOTIFICAÇÕES ===== -->

<div class="card">

<h2>🔔 Notificações</h2>

<div id="notifications">

<div class="message">
✨ Bem-vinda ao SnapWeb
</div>

</div>

</div>

<!-- ===== IA EMOCIONAL ===== -->

<div class="card">

<h2>🤖 IA Emocional</h2>

<button onclick="aiEmotion()">
Analisar Humor 💜
</button>

<div id="aiResult"></div>

</div>

<script>

/* ===== VIBE ===== */

function changeVibe(){

const mood =
document.getElementById(
'dailyMood'
).value;

document.body.style.background = `
linear-gradient(
135deg,
#5f00ff,
#ff0080,
#ff7a00
)
`;

addNotification(
'🌈 Sua vibe mudou para ' + mood
);

}

/* ===== SEGUIDORES ===== */

let followers = 120;

function followUser(){

followers++;

document.getElementById(
'followers'
).innerHTML =
followers + ' seguidores';

addNotification(
'❤️ Novo seguidor!'
);

}

/* ===== NOTIFICAÇÕES ===== */

function addNotification(text){

document.getElementById(
'notifications'
).innerHTML += `

<div class="message">

${text}

</div>

`;

}

/* ===== IA ===== */

function aiEmotion(){

const result =
document.getElementById(
'aiResult'
);

result.innerHTML = `

<div class="message">

💜 IA:
Continue compartilhando
sua energia positiva ✨

</div>

`;

addNotification(
'🤖 IA analisou seu humor'
);

}

</script>
